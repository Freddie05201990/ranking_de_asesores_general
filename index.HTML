<title>Ranking Cobranza — Semana 24</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green-dark:   #1b5e20;
    --green-mid:    #2e7d32;
    --green-light:  #388e3c;
    --green-bg1:    #e8f5e9;
    --green-bg2:    #f1f8e9;
    --green-bg3:    #f9fbe9;
    --green-border: #a5d6a7;
    --red-bg:       #fff5f5;
    --red-text:     #c62828;
    --red-border:   #ef9a9a;
    --gray-bg:      #f8fafc;
    --gray-border:  #e2e8f0;
    --text-main:    #1a1a1a;
    --text-muted:   #64748b;
    --white:        #ffffff;
    --radius-sm:    6px;
    --radius-md:    10px;
    --radius-lg:    14px;
    --shadow-sm:    0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
    --shadow-md:    0 4px 12px rgba(0,0,0,.08);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f4f0;
    color: var(--text-main);
    min-height: 100vh;
    padding: 0 0 3rem;
  }

  /* ── Header ── */
  header {
    background: var(--green-dark);
    color: #fff;
    padding: 2rem 1.5rem 1.75rem;
    text-align: center;
  }
  header .label {
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #a5d6a7;
    margin-bottom: .5rem;
  }
  header h1 {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 600;
    margin-bottom: .35rem;
  }
  header p { font-size: 14px; color: #c8e6c9; }

  /* ── Metrics ── */
  .metrics-band {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    background: var(--green-mid);
    padding: 1rem 1.5rem;
  }
  .metric {
    background: rgba(255,255,255,.12);
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    text-align: center;
    min-width: 130px;
  }
  .metric-label { font-size: 11px; color: #c8e6c9; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 3px; }
  .metric-val   { font-size: 20px; font-weight: 600; color: #fff; }
  .metric-val.red { color: #ffcdd2; }

  /* ── Controls ── */
  .controls {
    max-width: 900px;
    margin: 1.5rem auto 0;
    padding: 0 1rem;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
  button {
    padding: 7px 16px;
    font-size: 13px;
    border-radius: 20px;
    border: 1.5px solid var(--green-border);
    background: var(--white);
    color: var(--green-mid);
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: all .15s;
  }
  button:hover  { background: var(--green-bg1); }
  button.active { background: var(--green-mid); color: #fff; border-color: var(--green-mid); }
  .search-wrap { flex: 1; min-width: 180px; }
  input[type=text] {
    width: 100%;
    padding: 8px 14px;
    font-size: 13px;
    border: 1.5px solid var(--gray-border);
    border-radius: 20px;
    background: var(--white);
    color: var(--text-main);
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
  }
  input[type=text]:focus { border-color: var(--green-mid); box-shadow: 0 0 0 3px rgba(46,125,50,.12); }

  /* ── Legend ── */
  .legend {
    max-width: 900px;
    margin: .85rem auto 0;
    padding: 0 1rem;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--text-muted);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  /* ── Content ── */
  .content { max-width: 900px; margin: 1.25rem auto 0; padding: 0 1rem; }

  /* ── Section / team card ── */
  .section { margin-bottom: 1.25rem; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); background: var(--white); }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(0,0,0,.06);
  }
  .sh-icon { font-size: 20px; }
  .sh-info { flex: 1; }
  .sh-name { font-size: 14px; font-weight: 600; color: var(--green-dark); }
  .sh-stats { font-size: 12px; color: var(--green-light); margin-top: 1px; }
  .sh-badge {
    font-size: 11px;
    background: var(--white);
    border: 1px solid var(--green-border);
    color: var(--green-mid);
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
    white-space: nowrap;
  }
  .enc-jona  { background: #e8f5e9; }
  .enc-jorge { background: #f1f8e9; }
  .enc-ana   { background: #e0f2f1; }
  .enc-ivan  { background: #e8f5e9; }
  .enc-default { background: #f1f5f9; }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; background: var(--white); }
  thead th {
    background: var(--gray-bg);
    color: var(--text-muted);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .07em;
    padding: 9px 14px;
    text-align: left;
    border-bottom: 1px solid var(--gray-border);
  }
  thead th:nth-child(3),
  thead th:nth-child(4) { text-align: right; }
  tbody tr { border-bottom: .5px solid var(--gray-border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f7fdf7; }
  tbody tr.top1 { background: #e8f5e9; }
  tbody tr.top2 { background: #f1f8e9; }
  tbody tr.top3 { background: #f9fbe9; }
  tbody tr.zero { background: var(--red-bg); }
  td { padding: 9px 14px; font-size: 13px; color: var(--text-main); vertical-align: middle; }
  td:nth-child(3),
  td:nth-child(4) { text-align: right; }

  .rank-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 50%;
    font-size: 11px; font-weight: 600;
  }
  .r1 { background: var(--green-dark); color: #fff; }
  .r2 { background: #558b2f; color: #fff; }
  .r3 { background: #827717; color: #fff; }
  .rn { background: #f1f5f9; color: var(--text-muted); }
  .rz { background: #ffebee; color: var(--red-text); }

  .amt { font-weight: 600; }
  .amt-top  { color: var(--green-dark); }
  .amt-mid  { color: var(--text-main); }
  .amt-zero { color: var(--red-text); }
  .cnt      { color: var(--text-muted); font-size: 13px; }

  .no-results { padding: 2.5rem; text-align: center; color: var(--text-muted); font-size: 14px; background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }

  /* ── Footer ── */
  footer {
    max-width: 900px;
    margin: 2rem auto 0;
    padding: 0 1rem;
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
  }

  @media (max-width: 600px) {
    .controls { flex-direction: column; align-items: stretch; }
    .search-wrap { width: 100%; }
    thead th:nth-child(4), td:nth-child(4) { display: none; }
  }
</style>
</head>

  {suc:'IZTAPALAPA',enc:'DANIELA BERENICE CLEMENTE TADEO',gestor:'JESUS MORALES PONCE DE LEON',rec:0,cuentas:2},
];

const encClass = {
  'JONATHAN RIVERA CUADRA':'enc-jona',
  'JORGE EDUARDO MANRIQUEZ SALAS':'enc-jorge',
  'ANA CRISTINA MARTINEZ BAUTISTA':'enc-ana',
  'IVAN PRADO TADEO':'enc-ivan',
  'DANIELA BERENICE CLEMENTE TADEO':'enc-ivan',
  'SIN ASIGNAR':'enc-default'
};

let activeSuc = 'todas', activeSort = 'rec', search = '';

function setSuc(s, btn) {
  activeSuc = s;
  document.querySelectorAll('#suc-btns button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setSort(s, btn) {
  activeSort = s;
  document.querySelectorAll('#sort-btns button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setSearch(v) { search = v.toLowerCase(); render(); }

function fmt(n) { return '$' + Math.round(n).toLocaleString('es-MX'); }

function render() {
  let data = raw.filter(r => activeSuc === 'todas' || r.suc === activeSuc);
  if (search) data = data.filter(r => r.gestor.toLowerCase().includes(search) || r.enc.toLowerCase().includes(search));

  const totalRec    = data.reduce((s,r) => s+r.rec, 0);
  const totalGest   = new Set(data.map(r=>r.gestor)).size;
  const totalCuent  = data.reduce((s,r) => s+r.cuentas, 0);
  const sinRec      = data.filter(r=>r.rec===0).length;

  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Recuperación total</div><div class="metric-val">${fmt(totalRec)}</div></div>
    <div class="metric"><div class="metric-label">Gestores activos</div><div class="metric-val">${totalGest}</div></div>
    <div class="metric"><div class="metric-label">Total cuentas</div><div class="metric-val">${totalCuent.toLocaleString('es-MX')}</div></div>
    <div class="metric"><div class="metric-label">Sin recuperación</div><div class="metric-val red">${sinRec}</div></div>
  `;

  const map = {};
  data.forEach(r => {
    const k = r.suc+'||'+r.enc;
    if (!map[k]) map[k] = {suc:r.suc, enc:r.enc, list:[], totalRec:0, totalC:0};
    map[k].list.push(r); map[k].totalRec += r.rec; map[k].totalC += r.cuentas;
  });

  const groups = Object.values(map).sort((a,b) => b.totalRec - a.totalRec);
  groups.forEach(g => g.list.sort((a,b) => activeSort==='rec' ? b.rec-a.rec : b.cuentas-a.cuentas));

  if (!groups.length) {
    document.getElementById('ranking-root').innerHTML = '<div class="no-results">No se encontraron resultados para tu búsqueda.</div>';
    return;
  }

  let html = '';
  groups.forEach(g => {
    const cls = encClass[g.enc] || 'enc-default';
    html += `<div class="section">
      <div class="section-header ${cls}">
        <span class="sh-icon">👥</span>
        <div class="sh-info">
          <div class="sh-name">${g.enc}</div>
          <div class="sh-stats">${fmt(g.totalRec)} · ${g.totalC.toLocaleString('es-MX')} cuentas</div>
        </div>
        <span class="sh-badge">${g.suc}</span>
      </div>
      <table>
        <thead><tr><th>#</th><th>Gestor</th><th>Recuperación</th><th>Cuentas</th></tr></thead>
        <tbody>`;
    g.list.forEach((r, i) => {
      const rank = i+1;
      const rowCls = rank===1?'top1':rank===2?'top2':rank===3?'top3':r.rec===0?'zero':'';
      const bCls   = rank===1?'r1':rank===2?'r2':rank===3?'r3':r.rec===0?'rz':'rn';
      
      // Ajuste visual: si se ordena por cuentas, el resaltado de monto alto pasa a normal, a menos que siga siendo top
      const aCls   = (activeSort === 'rec' && rank <= 3) ? 'amt-top' : (r.rec === 0 ? 'amt-zero' : 'amt-mid');
      
      html += `<tr class="${rowCls}">
        <td><span class="rank-badge ${bCls}">${rank}</span></td>
        <td>${r.gestor}</td>
        <td><span class="amt ${aCls}">${fmt(r.rec)}</span></td>
        <td class="cnt">${r.cuentas}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });

  document.getElementById('ranking-root').innerHTML = html;
}

render();
</script>
</body>
</html>
