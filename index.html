<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ranking Cobranza — Semana 25</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --g-dark:   #1b5e20;
    --g-mid:    #2e7d32;
    --g-light:  #388e3c;
    --g-bg1:    #e8f5e9;
    --g-bg2:    #f1f8e9;
    --g-bg3:    #f9fbe9;
    --g-border: #a5d6a7;
    --r-bg:     #fff5f5;
    --r-text:   #c62828;
    --gray-bg:  #f8fafc;
    --gray-b:   #e2e8f0;
    --t-main:   #1a1a1a;
    --t-muted:  #64748b;
    --white:    #ffffff;
    --rad-lg:   14px;
    --rad-sm:   6px;
    --shadow:   0 1px 4px rgba(0,0,0,.08);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #eef3ee;
    color: var(--t-main);
    min-height: 100vh;
    padding-bottom: 3rem;
  }

  /* ── HEADER ── */
  header {
    background: var(--g-dark);
    color: #fff;
    text-align: center;
    padding: 2rem 1.5rem 1.5rem;
  }
  .header-eyebrow {
    font-size: 11px;
    letter-spacing: .13em;
    text-transform: uppercase;
    color: #a5d6a7;
    margin-bottom: .45rem;
  }
  header h1 { font-size: clamp(1.45rem, 4vw, 2.1rem); font-weight: 700; margin-bottom: .3rem; }
  header p  { font-size: 13.5px; color: #c8e6c9; }

  /* ── METRICS BAR ── */
  .metrics-bar {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    background: var(--g-mid);
    padding: 1rem 1.25rem;
  }
  .metric {
    background: rgba(255,255,255,.13);
    border-radius: var(--rad-sm);
    padding: 9px 18px;
    text-align: center;
    min-width: 120px;
  }
  .metric-lbl { font-size: 10.5px; color: #c8e6c9; text-transform: uppercase; letter-spacing: .09em; margin-bottom: 3px; }
  .metric-val { font-size: 19px; font-weight: 700; color: #fff; }
  .metric-val.red { color: #ffcdd2; }

  /* ── CONTROLS ── */
  .controls {
    max-width: 920px;
    margin: 1.4rem auto 0;
    padding: 0 1rem;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
  button {
    padding: 7px 16px;
    font-size: 13px;
    border-radius: 20px;
    border: 1.5px solid var(--g-border);
    background: var(--white);
    color: var(--g-mid);
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: all .14s;
  }
  button:hover  { background: var(--g-bg1); }
  button.active { background: var(--g-mid); color: #fff; border-color: var(--g-mid); }

  .search-wrap { flex: 1; min-width: 180px; }
  input[type=text] {
    width: 100%;
    padding: 8px 14px;
    font-size: 13px;
    border: 1.5px solid var(--gray-b);
    border-radius: 20px;
    background: var(--white);
    color: var(--t-main);
    font-family: inherit;
    outline: none;
    transition: border-color .14s;
  }
  input[type=text]:focus { border-color: var(--g-mid); box-shadow: 0 0 0 3px rgba(46,125,50,.13); }

  /* ── LEGEND ── */
  .legend {
    max-width: 920px;
    margin: .7rem auto 0;
    padding: 0 1rem;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--t-muted);
  }
  .li { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  /* ── CONTENT ── */
  .content { max-width: 920px; margin: 1.1rem auto 0; padding: 0 1rem; }

  /* ── SEGMENT CARD ── */
  .seg-card {
    margin-bottom: 1.2rem;
    border-radius: var(--rad-lg);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .seg-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    background: var(--g-bg1);
    border-bottom: 1px solid rgba(0,0,0,.06);
  }
  .seg-icon { font-size: 22px; }
  .seg-info { flex: 1; }
  .seg-title  { font-size: 15px; font-weight: 700; color: var(--g-dark); }
  .seg-sub    { font-size: 12px; color: var(--g-light); margin-top: 2px; }
  .seg-badge  {
    font-size: 11px; font-weight: 600;
    background: var(--white);
    border: 1px solid var(--g-border);
    color: var(--g-mid);
    padding: 3px 11px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* ── TABLE ── */
  table { width: 100%; border-collapse: collapse; background: var(--white); }
  thead th {
    background: var(--gray-bg);
    color: var(--t-muted);
    font-weight: 600;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: .07em;
    padding: 9px 14px;
    text-align: left;
    border-bottom: 1px solid var(--gray-b);
  }
  thead th.r { text-align: right; }
  thead th.c { text-align: center; }

  tbody tr { border-bottom: .5px solid var(--gray-b); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f6fcf6; }

  /* Row highlights */
  tbody tr.top1 { background: #dcedc8; }
  tbody tr.top2 { background: #e8f5e9; }
  tbody tr.top3 { background: #f1f8e9; }
  tbody tr.zero { background: var(--r-bg); }

  td { padding: 9px 14px; font-size: 13px; vertical-align: middle; }
  td.r { text-align: right; }
  td.c { text-align: center; }

  /* Rank badges */
  .rb {
    display: inline-flex; align-items: center; justify-content: center;
    width: 25px; height: 25px; border-radius: 50%;
    font-size: 11px; font-weight: 700;
  }
  .rb1 { background: var(--g-dark); color: #fff; }
  .rb2 { background: #558b2f; color: #fff; }
  .rb3 { background: #827717; color: #fff; }
  .rbn { background: #f1f5f9; color: var(--t-muted); }
  .rbz { background: #ffebee; color: var(--r-text); }

  /* Amount styling */
  .amt { font-weight: 700; }
  .amt-top  { color: var(--g-dark); font-size: 13.5px; }
  .amt-mid  { color: var(--t-main); }
  .amt-zero { color: var(--r-text); }

  /* Turno pill */
  .pill {
    display: inline-block;
    font-size: 11px; font-weight: 500;
    padding: 2px 9px; border-radius: 20px;
  }
  .pill-mat { background: #fff8e1; color: #e65100; }
  .pill-ves { background: #ede7f6; color: #5e35b1; }

  /* Bar chart per row */
  .bar-wrap { width: 90px; }
  .bar-bg   { background: #e8f5e9; border-radius: 4px; height: 6px; overflow: hidden; }
  .bar-fill { background: var(--g-mid); height: 6px; border-radius: 4px; transition: width .3s; }
  .bar-fill.zero { background: #ef9a9a; }

  .no-results {
    padding: 2.5rem;
    text-align: center;
    color: var(--t-muted);
    font-size: 14px;
    background: var(--white);
    border-radius: var(--rad-lg);
  }

  footer {
    max-width: 920px;
    margin: 2rem auto 0;
    padding: 0 1rem;
    font-size: 12px;
    color: var(--t-muted);
    text-align: center;
  }

  @media (max-width: 620px) {
    .controls { flex-direction: column; }
    .search-wrap { width: 100%; }
    .bar-wrap, thead th.bar, td.bar { display: none; }
    thead th.ing, td.ing { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">BAZ Forcados — Cobranza</div>
  <h1>Ranking de Recuperación</h1>
  <p>Semana 25 · Por gestor y segmento</p>
</header>

<div class="metrics-bar" id="metrics"></div>

<div class="controls">
  <div class="btn-row" id="seg-btns">
    <button class="active" onclick="setSeg('todos',this)">Todos</button>
    <button onclick="setSeg('5',this)">Segmento 5</button>
    <button onclick="setSeg('6',this)">Segmento 6</button>
  </div>
  <div class="btn-row" id="turno-btns">
    <button class="active" onclick="setTurno('todos',this)">Todos los turnos</button>
    <button onclick="setTurno('MATUTINO',this)">☀️ Matutino</button>
    <button onclick="setTurno('VESPERTINO',this)">🌙 Vespertino</button>
  </div>
  <div class="search-wrap">
    <input type="text" placeholder="🔍 Buscar gestor..." oninput="setSearch(this.value)" />
  </div>
</div>

<div class="legend">
  <span class="li"><span class="dot" style="background:#1b5e20"></span>Top 1</span>
  <span class="li"><span class="dot" style="background:#558b2f"></span>Top 2</span>
  <span class="li"><span class="dot" style="background:#827717"></span>Top 3</span>
  <span class="li"><span class="dot" style="background:#dcedc8;border:1px solid #a5d6a7"></span>Posición 1 (fila)</span>
  <span class="li"><span class="dot" style="background:#ffebee;border:1px solid #ef9a9a"></span>Sin recuperación</span>
</div>

<div class="content" id="root"></div>

<footer>Generado automáticamente · Semana 25 · Proyecto BAZ Forcados</footer>

<script>
const raw = [
  {n:'JAZMIN LUCERO RODRIGUEZ ROSALES',    t:'MATUTINO',   seg:'5', ing:'2026-04-10', m:31323.00},
  {n:'NAYELI MATA HURTADO',                t:'MATUTINO',   seg:'5', ing:'2025-04-09', m:30033.00},
  {n:'DIANA CAMPOS GONZALEZ',              t:'MATUTINO',   seg:'5', ing:'2026-04-08', m:28467.00},
  {n:'GUADALUPE ABIGAIL NAJERA VAZQUEZ',   t:'MATUTINO',   seg:'5', ing:'2026-05-05', m:25731.00},
  {n:'NAHOMI MONTSERRAT LECHUGA AGUILAR',  t:'MATUTINO',   seg:'5', ing:'2025-06-21', m:23753.00},
  {n:'VIRGINIA MANUELA GARCIA GARCIA',     t:'MATUTINO',   seg:'5', ing:'2025-03-26', m:16162.00},
  {n:'VALERIA LOPEZ MEDINA',               t:'MATUTINO',   seg:'5', ing:'2025-03-31', m:14217.00},
  {n:'DULCE JOVANA LAGUNES MELENDEZ',      t:'VESPERTINO', seg:'5', ing:'2025-04-09', m:13501.38},
  {n:'FRIDA TAMARA FALCON MARTINEZ',       t:'MATUTINO',   seg:'5', ing:'2025-12-10', m:13100.00},
  {n:'FANNY MONTES IBAÑEZ',                t:'MATUTINO',   seg:'5', ing:'2026-05-30', m:12079.00},
  {n:'JULIO JOSHUA RODRIGUEZ BLANCO',      t:'VESPERTINO', seg:'5', ing:'2026-05-08', m:11878.00},
  {n:'DIANA GUADALUPE SALAZAR JULIAN',     t:'MATUTINO',   seg:'5', ing:'2026-06-02', m:8490.00},
  {n:'ANA FERNANDA AMBROSIO POMPA',        t:'MATUTINO',   seg:'5', ing:'2026-04-20', m:8102.00},
  {n:'CESAR LAURO MATUS ROJAS',            t:'VESPERTINO', seg:'5', ing:'2026-01-28', m:8100.00},
  {n:'MAURO URIEL CABRERA TORRES',         t:'MATUTINO',   seg:'5', ing:'2025-08-07', m:8005.00},
  {n:'DIANA KATYA FUENTES GARCIA',         t:'VESPERTINO', seg:'5', ing:'2025-12-05', m:7534.00},
  {n:'KARLA PAOLA MORALES SANCHEZ',        t:'MATUTINO',   seg:'5', ing:'2026-01-23', m:6752.00},
  {n:'CESAR ISAC BECERRIL ALVARADO',       t:'VESPERTINO', seg:'5', ing:'2026-05-25', m:6001.00},
  {n:'JOSE ANTONIO ZEPEDA GALVAN',         t:'VESPERTINO', seg:'5', ing:'2025-10-07', m:3983.00},
  {n:'HILARIA CORTES HERNANDEZ',           t:'VESPERTINO', seg:'5', ing:'2026-12-18', m:3268.00},
  {n:'CESAR EMILIO MEJIA JAVIER',          t:'VESPERTINO', seg:'5', ing:'2025-06-12', m:3072.00},
  {n:'HUGO OMAR HERNANDEZ CORONA',         t:'MATUTINO',   seg:'5', ing:'2026-06-06', m:2902.00},
  {n:'KARLA DANIELA SANDOVAL ESTRADA',     t:'MATUTINO',   seg:'5', ing:'2026-05-07', m:2167.00},
  {n:'ROCIO NOGUERON MARTINEZ',            t:'VESPERTINO', seg:'5', ing:'2025-10-08', m:2000.00},
  {n:'JESUS MORALES PONCE DE LEON',        t:'MATUTINO',   seg:'5', ing:'2026-06-01', m:1203.00},
  {n:'DANNA PAULINA MEDINA BALLESTEROS',   t:'MATUTINO',   seg:'5', ing:'2026-05-04', m:608.00},
  {n:'ANA ELIZABETH RODRIGUEZ RODRIGUEZ',  t:'MATUTINO',   seg:'5', ing:'2026-06-06', m:0.00},
  {n:'PAMELA MICHELL MEDINA BALLESTEROS',  t:'MATUTINO',   seg:'6', ing:'2025-05-14', m:53987.00},
  {n:'JOHANA ARLETHE PEREZ SAAVEDRA',      t:'MATUTINO',   seg:'6', ing:'2026-06-01', m:17690.00},
  {n:'KELLY ITZEL ORTEGA GONZALEZ',        t:'MATUTINO',   seg:'6', ing:'2025-11-07', m:15449.00},
  {n:'SONIA REZA CRUZ',                    t:'MATUTINO',   seg:'6', ing:'2025-08-07', m:5404.00},
  {n:'MARLEM SANTOS CRUZ',                 t:'VESPERTINO', seg:'6', ing:'2026-03-11', m:4072.00},
  {n:'ULISES HERNANDEZ GARCIA',            t:'VESPERTINO', seg:'6', ing:'2026-03-18', m:3979.00},
  {n:'DANIEL VICTORIA ROMERO',             t:'VESPERTINO', seg:'6', ing:'2025-12-22', m:1270.00},
  {n:'MIGUEL ANGEL MUÑOS ARCINIEGA',       t:'VESPERTINO', seg:'6', ing:'2026-05-16', m:444.00},
];

let activeSeg = 'todos', activeTurno = 'todos', search = '';

const $ = id => document.getElementById(id);

function setSeg(s, btn) {
  activeSeg = s;
  $('seg-btns').querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setTurno(t, btn) {
  activeTurno = t;
  $('turno-btns').querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setSearch(v) { search = v.toLowerCase(); render(); }

const fmt = n => '$' + Math.round(n).toLocaleString('es-MX');
const fmtF = f => { const [y,m,d] = f.split('-'); return `${d}/${m}/${y}`; };

function render() {
  let data = raw.filter(r =>
    (activeSeg   === 'todos' || r.seg === activeSeg) &&
    (activeTurno === 'todos' || r.t   === activeTurno) &&
    (!search || r.n.toLowerCase().includes(search))
  );

  // Metrics
  const totM   = data.reduce((s,r) => s+r.m, 0);
  const sinRec = data.filter(r => r.m === 0).length;
  const prom   = data.length ? totM/data.length : 0;
  const maxM   = Math.max(...data.map(r=>r.m), 1);

  $('metrics').innerHTML = `
    <div class="metric"><div class="metric-lbl">Recuperación total</div><div class="metric-val">${fmt(totM)}</div></div>
    <div class="metric"><div class="metric-lbl">Gestores</div><div class="metric-val">${data.length}</div></div>
    <div class="metric"><div class="metric-lbl">Promedio</div><div class="metric-val">${fmt(prom)}</div></div>
    <div class="metric"><div class="metric-lbl">Sin recuperación</div><div class="metric-val red">${sinRec}</div></div>
  `;

  // Group by segment
  const map = {};
  data.forEach(r => {
    if (!map[r.seg]) map[r.seg] = {seg:r.seg, list:[], total:0};
    map[r.seg].list.push(r);
    map[r.seg].total += r.m;
  });
  const groups = Object.values(map).sort((a,b) => b.total - a.total);
  groups.forEach(g => g.list.sort((a,b) => b.m - a.m));

  if (!groups.length) {
    $('root').innerHTML = '<div class="no-results">No se encontraron resultados.</div>';
    return;
  }

  const segMaxMap = {};
  groups.forEach(g => { segMaxMap[g.seg] = Math.max(...g.list.map(r=>r.m), 1); });

  let html = '';
  groups.forEach(g => {
    const pct = (g.total / totM * 100).toFixed(1);
    html += `
    <div class="seg-card">
      <div class="seg-header">
        <span class="seg-icon">📊</span>
        <div class="seg-info">
          <div class="seg-title">Segmento ${g.seg}</div>
          <div class="seg-sub">${fmt(g.total)} · ${g.list.length} gestores · ${pct}% del total</div>
        </div>
        <span class="seg-badge">SEG ${g.seg}</span>
      </div>
      <table>
        <thead>
          <tr>
            <th style="width:36px">#</th>
            <th>Gestor</th>
            <th class="r">Recuperación</th>
            <th class="bar">Distribución</th>
            <th class="ing">Ingreso</th>
            <th class="c">Turno</th>
          </tr>
        </thead>
        <tbody>`;

    g.list.forEach((r, i) => {
      const rank = i + 1;
      const pctBar = (r.m / segMaxMap[g.seg] * 100).toFixed(1);
      const rowCls = rank===1?'top1':rank===2?'top2':rank===3?'top3':r.m===0?'zero':'';
      const bCls   = rank===1?'rb1':rank===2?'rb2':rank===3?'rb3':r.m===0?'rbz':'rbn';
      const aCls   = rank<=3?'amt-top':r.m===0?'amt-zero':'amt-mid';
      const tCls   = r.t==='MATUTINO'?'pill-mat':'pill-ves';
      const tLbl   = r.t==='MATUTINO'?'☀️ Mat':'🌙 Ves';
      const barCls = r.m===0?'zero':'';

      html += `
          <tr class="${rowCls}">
            <td><span class="rb ${bCls}">${rank}</span></td>
            <td>${r.n}</td>
            <td class="r"><span class="amt ${aCls}">${fmt(r.m)}</span></td>
            <td class="bar">
              <div class="bar-wrap">
                <div class="bar-bg"><div class="bar-fill ${barCls}" style="width:${pctBar}%"></div></div>
              </div>
            </td>
            <td class="ing" style="color:var(--t-muted);font-size:12px">${fmtF(r.ing)}</td>
            <td class="c"><span class="pill ${tCls}">${tLbl}</span></td>
          </tr>`;
    });

    html += `</tbody></table></div>`;
  });

  $('root').innerHTML = html;
}

render();
</script>
</body>
</html>
