<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ranking Cobranza — Semana 25</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green-dark:   #1b5e20;
    --green-mid:    #2e7d32;
    --green-light:  #388e3c;
    --green-bg1:    #e8f5e9;
    --green-bg2:    #f1f8e9;
    --green-border: #a5d6a7;
    --red-bg:       #fff5f5;
    --red-text:     #c62828;
    --red-border:   #ef9a9a;
    --gray-bg:      #f8fafc;
    --gray-border:  #e2e8f0;
    --text-main:    #1a1a1a;
    --text-muted:   #64748b;
    --white:        #ffffff;
    --radius-sm:    6px;
    --radius-md:    10px;
    --radius-lg:    14px;
    --shadow-sm:    0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f4f0;
    color: var(--text-main);
    min-height: 100vh;
    padding: 0 0 3rem;
  }

  /* ── Header ── */
  header {
    background: var(--green-dark);
    color: #fff;
    padding: 2rem 1.5rem 1.75rem;
    text-align: center;
  }
  header .label {
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #a5d6a7;
    margin-bottom: .5rem;
  }
  header h1 {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 600;
    margin-bottom: .35rem;
  }
  header p { font-size: 14px; color: #c8e6c9; }

  /* ── Metrics ── */
  .metrics-band {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    background: var(--green-mid);
    padding: 1rem 1.5rem;
  }
  .metric {
    background: rgba(255,255,255,.12);
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    text-align: center;
    min-width: 130px;
  }
  .metric-label { font-size: 11px; color: #c8e6c9; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 3px; }
  .metric-val   { font-size: 20px; font-weight: 600; color: #fff; }
  .metric-val.red { color: #ffcdd2; }

  /* ── Controls ── */
  .controls {
    max-width: 900px;
    margin: 1.5rem auto 0;
    padding: 0 1rem;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
  button {
    padding: 7px 16px;
    font-size: 13px;
    border-radius: 20px;
    border: 1.5px solid var(--green-border);
    background: var(--white);
    color: var(--green-mid);
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: all .15s;
  }
  button:hover  { background: var(--green-bg1); }
  button.active { background: var(--green-mid); color: #fff; border-color: var(--green-mid); }
  .search-wrap { flex: 1; min-width: 180px; }
  input[type=text] {
    width: 100%;
    padding: 8px 14px;
    font-size: 13px;
    border: 1.5px solid var(--gray-border);
    border-radius: 20px;
    background: var(--white);
    color: var(--text-main);
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
  }
  input[type=text]:focus { border-color: var(--green-mid); box-shadow: 0 0 0 3px rgba(46,125,50,.12); }

  /* ── Legend ── */
  .legend {
    max-width: 900px;
    margin: .85rem auto 0;
    padding: 0 1rem;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--text-muted);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  /* ── Content ── */
  .content { max-width: 900px; margin: 1.25rem auto 0; padding: 0 1rem; }

  /* ── Section / segment card ── */
  .section { margin-bottom: 1.25rem; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(0,0,0,.06);
    background: var(--green-bg1);
  }
  .sh-icon { font-size: 20px; }
  .sh-info { flex: 1; }
  .sh-name { font-size: 14px; font-weight: 600; color: var(--green-dark); }
  .sh-stats { font-size: 12px; color: var(--green-light); margin-top: 1px; }
  .sh-badge {
    font-size: 11px;
    background: var(--white);
    border: 1px solid var(--green-border);
    color: var(--green-mid);
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
    white-space: nowrap;
  }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; background: var(--white); }
  thead th {
    background: var(--gray-bg);
    color: var(--text-muted);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .07em;
    padding: 9px 14px;
    text-align: left;
    border-bottom: 1px solid var(--gray-border);
  }
  thead th:nth-child(3),
  thead th:nth-child(4) { text-align: right; }
  thead th:nth-child(5) { text-align: center; }
  tbody tr { border-bottom: .5px solid var(--gray-border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f7fdf7; }
  tbody tr.top1 { background: #e8f5e9; }
  tbody tr.top2 { background: #f1f8e9; }
  tbody tr.top3 { background: #f9fbe9; }
  tbody tr.zero { background: var(--red-bg); }
  td { padding: 9px 14px; font-size: 13px; color: var(--text-main); vertical-align: middle; }
  td:nth-child(3),
  td:nth-child(4) { text-align: right; }
  td:nth-child(5) { text-align: center; }

  .rank-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 50%;
    font-size: 11px; font-weight: 600;
  }
  .r1 { background: var(--green-dark); color: #fff; }
  .r2 { background: #558b2f; color: #fff; }
  .r3 { background: #827717; color: #fff; }
  .rn { background: #f1f5f9; color: var(--text-muted); }
  .rz { background: #ffebee; color: var(--red-text); }

  .amt { font-weight: 600; }
  .amt-top  { color: var(--green-dark); }
  .amt-mid  { color: var(--text-main); }
  .amt-zero { color: var(--red-text); }
  .cnt      { color: var(--text-muted); font-size: 13px; }

  .turno-pill {
    display: inline-block;
    font-size: 11px;
    padding: 2px 9px;
    border-radius: 20px;
    font-weight: 500;
  }
  .turno-mat { background: #fff8e1; color: #f57f17; }
  .turno-ves { background: #ede7f6; color: #5e35b1; }

  .no-results { padding: 2.5rem; text-align: center; color: var(--text-muted); font-size: 14px; background: var(--white); border-radius: var(--radius-lg); }

  /* ── Footer ── */
  footer {
    max-width: 900px;
    margin: 2rem auto 0;
    padding: 0 1rem;
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
  }

  @media (max-width: 600px) {
    .controls { flex-direction: column; }
    .search-wrap { width: 100%; }
    thead th:nth-child(5), td:nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="label">BAZ Forcados — Cobranza</div>
  <h1>Ranking de Recuperación</h1>
  <p>Semana 25 · Por gestor y segmento</p>
</header>

<div class="metrics-band" id="metrics"></div>

<div class="controls">
  <div class="btn-group" id="seg-btns">
    <button class="active" onclick="setSeg('todos',this)">Todos</button>
    <button onclick="setSeg('5',this)">Segmento 5</button>
    <button onclick="setSeg('6',this)">Segmento 6</button>
  </div>
  <div class="btn-group" id="turno-btns">
    <button class="active" onclick="setTurno('todos',this)">Todos los turnos</button>
    <button onclick="setTurno('MATUTINO',this)">Matutino</button>
    <button onclick="setTurno('VESPERTINO',this)">Vespertino</button>
  </div>
  <div class="search-wrap">
    <input type="text" placeholder="🔍 Buscar gestor..." oninput="setSearch(this.value)" />
  </div>
</div>

<div class="legend">
  <span class="legend-item"><span class="dot" style="background:#1b5e20"></span>Top 1</span>
  <span class="legend-item"><span class="dot" style="background:#558b2f"></span>Top 2</span>
  <span class="legend-item"><span class="dot" style="background:#827717"></span>Top 3</span>
  <span class="legend-item"><span class="dot" style="background:#ffebee;border:1px solid #ef9a9a"></span>Sin recuperación</span>
</div>

<div class="content" id="ranking-root"></div>

<footer>Generado automáticamente · Semana 25 · Proyecto BAZ Forcados</footer>

<script>
const raw = [

  {nombre:'VALERIA LOPEZ MEDINA',turno:'MATUTINO',puesto:'TELEFONICO',segmento:'5',ingreso:'2025-03-31',monto:14805.00},
  {nombre:'DULCE JOVANA LAGUNES MELENDEZ',turno:'VESPERTINO',puesto:'TELEFONICO',segmento:'5',ingreso:'2025-04-09',monto:10663.38},
  {nombre:'VIRGINIA MANUELA GARCIA GARCIA',turno:'MATUTINO',puesto:'TELEFONICO',segmento:'5',ingreso:'2025-03-26',monto:7330.00},
  {nombre:'FRIDA TAMARA FALCON MARTINEZ',turno:'MATUTINO',puesto:'TELEFONICO',segmento:'5',ingreso:'2025-12-10',monto:7233.00},
  {nombre:'ANA FERNANDA AMBROSIO POMPA',turno:'MATUTINO',puesto:'TELEFONICO',segmento:'5',ingreso:'2026-04-20',monto:7102.00},
  {nombre:'FANNY MONTES IBAÑEZ',turno:'MATUTINO',puesto:'TELEFONICO',segmento:'5',ingreso:'2026-05-30',monto:6387.00},
  {nombre:'DIANA KATYA FUENTES GARCIA',turno:'VESPERTINO',puesto:'TELEFONICO',segmento:'5',ingreso:'2025-12-05',monto:5603.00},
  {nombre:'KARLA PAOLA MORALES SANCHEZ',turno:'MATUTINO',puesto:'TELEFONICO',segmento:'5',ingreso:'2026-01-23',monto:5014.00},
  {nombre:'JULIO JOSHUA RODRIGUEZ BLANCO',turno:'VESPERTINO',puesto:'TELEFONICO',segmento:'5',ingreso:'2026-05-08',monto:4850.00},
  {nombre:'CESAR LAURO MATUS ROJAS',turno:'VESPERTINO',puesto:'TELEFONICO',segmento:'5',ingreso:'2026-01-28',monto:4595.00},
  {nombre:'HUGO OMAR HERNANDEZ CORONA',turno:'MATUTINO',puesto:'MATUTINO',segmento:'5',ingreso:'2026-06-06',monto:2902.00},
  {nombre:'MAURO URIEL CABRERA TORRES',turno:'MATUTINO',puesto:'TELEFONICO',segmento:'5',ingreso:'2025-08-07',monto:2849.00},
  {nombre:'DIANA GUADALUPE SALAZAR JULIAN',turno:'MATUTINO',puesto:'TELEFONICO',segmento:'5',ingreso:'2026-06-02',monto:2451.00},
  {nombre:'HILARIA CORTES HERNANDEZ',turno:'VESPERTINO',puesto:'TELEFONICO',segmento:'5',ingreso:'2026-12-18',monto:2163.00},

  {nombre:'KARLA DANIELA SANDOVAL ESTRADA',turno:'MATUTINO',puesto:'TELEFONICO',segmento:'5',ingreso:'2026-05-07',monto:967.00},
  {nombre:'CESAR EMILIO MEJIA JAVIER',turno:'VESPERTINO',puesto:'TELEFONICO',segmento:'5',ingreso:'2025-06-12',monto:1458.00},
  {nombre:'CESAR ISAC BECERRIL ALVARADO',turno:'VESPERTINO',puesto:'TELEFONICO',segmento:'5',ingreso:'2026-05-25',monto:0.00},
  {nombre:'DANNA PAULINA MEDINA BALLESTEROS',turno:'MATUTINO',puesto:'TELEFONICO',segmento:'5',ingreso:'2026-05-04',monto:0.00},
  {nombre:'ANA ELIZABETH RODRIGUEZ RODRIGUEZ',turno:'MATUTINO',puesto:'MATUTINO',segmento:'5',ingreso:'2026-06-06',monto:0.00},
  {nombre:'JESUS MORALES PONCE DE LEON',turno:'MATUTINO',puesto:'MATUTINO',segmento:'5',ingreso:'2026-06-01',monto:0.00},
  {nombre:'PAMELA MICHELL MEDINA BALLESTEROS',turno:'MATUTINO',puesto:'TELEFONICO',segmento:'6',ingreso:'2025-05-14',monto:16625.00},
  {nombre:'KELLY ITZEL ORTEGA GONZALEZ',turno:'MATUTINO',puesto:'TELEFONICO',segmento:'6',ingreso:'2025-11-07',monto:12491.00},
  {nombre:'ULISES HERNANDEZ GARCIA',turno:'VESPERTINO',puesto:'TELEFONICO',segmento:'6',ingreso:'2026-03-18',monto:2879.00},
  {nombre:'JOHANA ARLETHE PEREZ SAAVEDRA',turno:'MATUTINO',puesto:'TELEFONICO',segmento:'6',ingreso:'2026-06-01',monto:2500.00},
  {nombre:'SONIA REZA CRUZ',turno:'MATUTINO',puesto:'TELEFONICO',segmento:'6',ingreso:'2025-08-07',monto:1974.00},
  {nombre:'MARLEM SANTOS CRUZ',turno:'VESPERTINO',puesto:'TELEFONICO',segmento:'6',ingreso:'2026-03-11',monto:1072.00},
  {nombre:'DANIEL VICTORIA ROMERO',turno:'VESPERTINO',puesto:'TELEFONICO',segmento:'6',ingreso:'2025-12-22',monto:570.00},
  {nombre:'MIGUEL ANGEL MUÑOS ARCINIEGA',turno:'VESPERTINO',puesto:'TELEFONICO',segmento:'6',ingreso:'2026-05-16',monto:444.00},
];

let activeSeg = 'todos', activeTurno = 'todos', search = '';

function setSeg(s, btn) {
  activeSeg = s;
  document.querySelectorAll('#seg-btns button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setTurno(t, btn) {
  activeTurno = t;
  document.querySelectorAll('#turno-btns button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setSearch(v) { search = v.toLowerCase(); render(); }

function fmt(n) { return '$' + Math.round(n).toLocaleString('es-MX'); }
function fmtFecha(f) {
  const [y,m,d] = f.split('-');
  return `${d}/${m}/${y}`;
}

function render() {
  let data = raw.filter(r => activeSeg === 'todos' || r.segmento === activeSeg);
  data = data.filter(r => activeTurno === 'todos' || r.turno === activeTurno);
  if (search) data = data.filter(r => r.nombre.toLowerCase().includes(search));

  const totalMonto = data.reduce((s,r) => s+r.monto, 0);
  const totalGest  = data.length;
  const sinRec     = data.filter(r=>r.monto===0).length;
  const promedio   = totalGest ? totalMonto/totalGest : 0;

  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Recuperación total</div><div class="metric-val">${fmt(totalMonto)}</div></div>
    <div class="metric"><div class="metric-label">Gestores</div><div class="metric-val">${totalGest}</div></div>
    <div class="metric"><div class="metric-label">Promedio por gestor</div><div class="metric-val">${fmt(promedio)}</div></div>
    <div class="metric"><div class="metric-label">Sin recuperación</div><div class="metric-val red">${sinRec}</div></div>
  `;

  const map = {};
  data.forEach(r => {
    const k = r.segmento;
    if (!map[k]) map[k] = {segmento:k, list:[], totalMonto:0};
    map[k].list.push(r); map[k].totalMonto += r.monto;
  });

  const groups = Object.values(map).sort((a,b) => b.totalMonto - a.totalMonto);
  groups.forEach(g => g.list.sort((a,b) => b.monto - a.monto));

  if (!groups.length) {
    document.getElementById('ranking-root').innerHTML = '<div class="no-results">No se encontraron resultados para tu búsqueda.</div>';
    return;
  }

  let html = '';
  groups.forEach(g => {
    html += `<div class="section">
      <div class="section-header">
        <span class="sh-icon">📊</span>
        <div class="sh-info">
          <div class="sh-name">Segmento ${g.segmento}</div>
          <div class="sh-stats">${fmt(g.totalMonto)} · ${g.list.length} gestores</div>
        </div>
        <span class="sh-badge">SEG ${g.segmento}</span>
      </div>
      <table>
        <thead><tr><th>#</th><th>Gestor</th><th>Recuperación</th><th>Ingreso</th><th>Turno</th></tr></thead>
        <tbody>`;
    g.list.forEach((r, i) => {
      const rank = i+1;
      const rowCls = rank===1?'top1':rank===2?'top2':rank===3?'top3':r.monto===0?'zero':'';
      const bCls   = rank===1?'r1':rank===2?'r2':rank===3?'r3':r.monto===0?'rz':'rn';
      const aCls   = rank<=3?'amt-top':r.monto===0?'amt-zero':'amt-mid';
      const tCls   = r.turno==='MATUTINO' ? 'turno-mat' : 'turno-ves';
      const tLabel = r.turno==='MATUTINO' ? 'Matutino' : 'Vespertino';
      html += `<tr class="${rowCls}">
        <td><span class="rank-badge ${bCls}">${rank}</span></td>
        <td>${r.nombre}</td>
        <td><span class="amt ${aCls}">${fmt(r.monto)}</span></td>
        <td class="cnt">${fmtFecha(r.ingreso)}</td>
        <td><span class="turno-pill ${tCls}">${tLabel}</span></td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });

  document.getElementById('ranking-root').innerHTML = html;
}

render();
</script>
</body>
</html>
